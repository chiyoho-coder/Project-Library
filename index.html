<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>My Library</h1>
        <button id="new-book-btn">+ New Book</button>
    </header>

    <main id="library-container"></main>

    <dialog id="book-dialog">
        <form id="book-form" method="dialog">
            <h2>New book information</h2>
            
            <label for="title">Title:</label>
            <input type="text" id="title" required>

            <label for="author">Author:</label>
            <input type="text" id="author" required>

            <label for="pages">Pages:</label>
            <input type="number" id="pages" min="1" required>

            <div class="checkbox-group">
                <input type="checkbox" id="read">
                <label for="read">Finished reading</label>
            </div>

            <div class="form-buttons">
                <button type="button" id="close-dialog-btn">cancel</button>
                <button type="submit" id="submit-btn">Save to library</button>
            </div>
        </form>
    </dialog>
</body>
</html>
